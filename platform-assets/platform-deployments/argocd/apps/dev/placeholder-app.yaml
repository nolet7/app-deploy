apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: placeholder-app-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: REPO_PLACEHOLDER_PLATFORM_DEPLOYMENTS
    targetRevision: HEAD
    path: charts/base-app
  destination:
    server: https://kubernetes.default.svc
    namespace: dev-apps
  syncPolicy:
    automated: {}
